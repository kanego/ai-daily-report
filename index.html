<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI组织变革日报</title>
    <meta property="og:title" content="AI组织变革日报">
    <meta property="og:description" content="每日精选 AI 与组织变革领域的重要资讯，助力产研团队转型决策。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kanego.github.io/ai-daily-report/">
    <meta property="og:image" content="https://kanego.github.io/ai-daily-report/og-image.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .hero { text-align: center; padding: 80px 20px 40px; background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 50%, #0a1a3e 100%); }
        .hero h1 { font-size: 2.5em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
        .hero p { font-size: 1.1em; color: #a0a0c0; max-width: 600px; margin: 0 auto; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .report-list { list-style: none; }
        .report-item { background: #12121f; border: 1px solid #2a2a4a; border-radius: 12px; padding: 24px; margin-bottom: 16px; transition: all 0.3s; }
        .report-item:hover { border-color: #667eea; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.15); }
        .report-item a { text-decoration: none; color: inherit; display: block; }
        .report-date { font-size: 0.85em; color: #667eea; font-weight: 600; margin-bottom: 8px; }
        .report-title { font-size: 1.2em; color: #fff; margin-bottom: 8px; }
        .report-summary { font-size: 0.95em; color: #8888aa; line-height: 1.6; }
        .empty { text-align: center; padding: 60px 20px; color: #666; }
        .footer { text-align: center; padding: 40px 20px; color: #444; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🤖 AI组织变革日报</h1>
        <p>每日精选 AI 与组织变革领域的重要资讯，助力产研团队转型决策。</p>
    </div>
    <div class="container">
        <ul class="report-list" id="reports"></ul>
        <div class="empty" id="empty" style="display:none;">暂无日报，明天见 ✨</div>
    </div>
    <div class="footer">
        <p>由丫头自动生成 ✨ Powered by AI</p>
    </div>
    <script>
        fetch('reports.json')
            .then(r => r.json())
            .then(reports => {
                const list = document.getElementById('reports');
                if (!reports.length) { document.getElementById('empty').style.display = 'block'; return; }
                reports.sort((a, b) => b.date.localeCompare(a.date));
                reports.forEach(r => {
                    const li = document.createElement('li');
                    li.className = 'report-item';
                    li.innerHTML = `<a href="${r.path}"><div class="report-date">📅 ${r.date}</div><div class="report-title">${r.title}</div><div class="report-summary">${r.summary}</div></a>`;
                    list.appendChild(li);
                });
            })
            .catch(() => { document.getElementById('empty').style.display = 'block'; });
    </script>
</body>
</html>
